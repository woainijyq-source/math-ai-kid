    <circle cx="300" cy="500" r="5"/><circle cx="700" cy="600" r="6"/><circle cx="1100" cy="550" r="7"/><circle cx="1500" cy="500" r="5"/><circle cx="1700" cy="620" r="6"/>
    <circle cx="150" cy="800" r="6"/><circle cx="500" cy="850" r="5"/><circle cx="900" cy="900" r="7"/><circle cx="1300" cy="800" r="5"/><circle cx="1750" cy="900" r="6"/>
