  <text x="700" y="500" font-size="60" fill="#10B981" opacity="0.13" font-family="serif" font-weight="bold">B</text>
  <text x="1100" y="350" font-size="68" fill="#34D399" opacity="0.14" font-family="serif" font-weight="bold">C</text>
  <text x="1450" y="600" font-size="55" fill="#10B981" opacity="0.13" font-family="serif" font-weight="bold">D</text>
  <text x="200" y="700" font-size="64" fill="#34D399" opacity="0.12" font-family="serif" font-weight="bold">E</text>
  <text x="1700" y="800" font-size="58" fill="#10B981" opacity="0.14" font-family="serif" font-weight="bold">F</text>
</svg>