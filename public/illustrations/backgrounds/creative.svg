<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- paint splashes -->
  <ellipse cx="200" cy="200" rx="80" ry="50" fill="#FCA5A5" opacity="0.2" transform="rotate(-20 200 200)"/>
  <ellipse cx="600" cy="100" rx="60" ry="40" fill="#86EFAC" opacity="0.2" transform="rotate(15 600 100)"/>
  <ellipse cx="1200" cy="200" rx="90" ry="55" fill="#93C5FD" opacity="0.2" transform="rotate(10 1200 200)"/>
  <ellipse cx="1700" cy="300" rx="70" ry="45" fill="#C4B5FD" opacity="0.2" transform="rotate(-10 1700 300)"/>
  <ellipse cx="300" cy="800" rx="85" ry="50" fill="#FCD34D" opacity="0.2" transform="rotate(25 300 800)"/>
  <ellipse cx="1500" cy="900" rx="75" ry="48" fill="#FB923C" opacity="0.18" transform="rotate(-15 1500 900)"/>
  <!-- stars -->
  <text x="900" y="150" font-size="60" fill="#FBBF24" opacity="0.3">★</text>
  <text x="400" y="400" font-size="40" fill="#F472B6" opacity="0.25">✦</text>
  <text x="1500" y="500" font-size="50" fill="#A78BFA" opacity="0.25">✨</text>
  <text x="700" y="800" font-size="45" fill="#34D399" opacity="0.25">★</text>
  <text x="1200" y="700" font-size="35" fill="#FBBF24" opacity="0.28">✦</text>
  <!-- lightbulb -->
  <circle cx="1800" cy="150" r="35" fill="#FDE68A" opacity="0.3"/>
  <rect x="1786" y="175" width="28" height="15" rx="4" fill="#FDE68A" opacity="0.3"/>
</svg>