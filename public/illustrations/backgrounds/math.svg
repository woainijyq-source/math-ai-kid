<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#FED7AA" stroke-width="1" opacity="0.5">
    <line x1="0" y1="120" x2="1920" y2="120"/><line x1="0" y1="240" x2="1920" y2="240"/><line x1="0" y1="360" x2="1920" y2="360"/><line x1="0" y1="480" x2="1920" y2="480"/><line x1="0" y1="600" x2="1920" y2="600"/><line x1="0" y1="720" x2="1920" y2="720"/><line x1="0" y1="840" x2="1920" y2="840"/><line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="240" y1="0" x2="240" y2="1080"/><line x1="480" y1="0" x2="480" y2="1080"/><line x1="720" y1="0" x2="720" y2="1080"/><line x1="960" y1="0" x2="960" y2="1080"/><line x1="1200" y1="0" x2="1200" y2="1080"/><line x1="1440" y1="0" x2="1440" y2="1080"/><line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>
  <!-- floating numbers -->
  <text x="120" y="200" font-size="80" fill="#FB923C" opacity="0.18" font-family="serif">3</text>
  <text x="400" y="350" font-size="60" fill="#F97316" opacity="0.15" font-family="serif">+</text>
  <text x="700" y="180" font-size="90" fill="#EA580C" opacity="0.12" font-family="serif">7</text>
  <text x="1100" y="280" font-size="70" fill="#FB923C" opacity="0.18" font-family="serif">=</text>
  <text x="1400" y="150" font-size="80" fill="#F97316" opacity="0.14" font-family="serif">5</text>
  <text x="1700" y="400" font-size="60" fill="#EA580C" opacity="0.16" font-family="serif">×</text>
  <text x="200" y="700" font-size="70" fill="#FB923C" opacity="0.13" font-family="serif">2</text>
  <text x="900" y="850" font-size="80" fill="#F97316" opacity="0.15" font-family="serif">9</text>
  <text x="1600" y="750" font-size="65" fill="#EA580C" opacity="0.14" font-family="serif">÷</text>
  <!-- shapes -->
  <circle cx="1800" cy="200" r="60" fill="none" stroke="#FB923C" stroke-width="4" opacity="0.2"/>
  <rect x="80" y="800" width="80" height="80" fill="none" stroke="#F97316" stroke-width="4" opacity="0.2" transform="rotate(20 120 840)"/>
  <polygon points="960,50 1010,150 910,150" fill="none" stroke="#EA580C" stroke-width="4" opacity="0.2"/>
</svg>