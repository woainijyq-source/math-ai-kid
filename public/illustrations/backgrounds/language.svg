<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- speech bubbles -->
  <rect x="100" y="100" width="200" height="100" rx="20" fill="#BBF7D0" opacity="0.3"/>
  <polygon points="140,200 160,230 180,200" fill="#BBF7D0" opacity="0.3"/>
  <rect x="1600" y="150" width="220" height="90" rx="20" fill="#A7F3D0" opacity="0.25"/>
  <polygon points="1780,240 1800,270 1820,240" fill="#A7F3D0" opacity="0.25"/>
